<style>
  :root {
    --bg: #0B0B0B;
    --accent: #DC2626;
    --accent-2: #EF4444;
    --accent-soft: rgba(220, 38, 38, 0.18);
    --accent-glow: rgba(220, 38, 38, 0.55);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-hover: rgba(255, 255, 255, 0.055);
    --text: #E5E5E5;
    --text-muted: #7d7d7d;
    --radius: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding-bottom: 56px;
  }

  /* ---- cover + profile header ---- */
  .cover {
    position: relative;
    height: 150px;
    width: 100%;
    background-size: cover;
    background-position: center;
    background-color: #0B0B0B;
    overflow: hidden;
  }
  /* gradiente + grade aparecem só quando não há foto de capa definida (ver CONFIG no final do arquivo) */
  .cover.no-image {
    background-image:
      radial-gradient(ellipse 420px 260px at 30% 0%, rgba(34,197,94,0.35), transparent 65%),
      radial-gradient(ellipse 380px 240px at 85% 30%, rgba(220,38,38,0.25), transparent 60%),
      linear-gradient(160deg, #101210 0%, #0B0B0B 70%);
  }
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(11,11,11,0.05) 0%, rgba(11,11,11,0.85) 100%);
  }
  .cover.no-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                       linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 26px 26px;
    mask-image: linear-gradient(180deg, black, transparent 90%);
  }

  .profile-block {
    padding: 0 20px;
    margin-top: -38px;
    position: relative;
  }

  .avatar-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 20px;
    background: linear-gradient(150deg, #1a1c1a, #0d0f0d);
    background-size: cover;
    background-position: center;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent-soft), 0 8px 20px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--accent-2);
  }

  .online-dot {
    position: absolute;
    bottom: 3px;
    right: -2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-2);
    border: 3px solid var(--bg);
  }
  .avatar-wrap { position: relative; }

  .subscribe-btn {
    margin-bottom: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #7f1d1d);
    color: #fdeaea;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 0.02em;
    border: none;
    box-shadow: 0 4px 16px rgba(220,38,38,0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .subscribe-btn:active {
    transform: scale(0.96);

  }

  .name-row {

    align-items: center;
    gap: 6px;
    margin-top: 14px;
  }

  h1 {

    font-weight: 700;
    font-size: 19px;
    margin: 0;
    color: #ffffff;
    letter-spacing: -0.01em;
  }

  .verified {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--accent-2);
  }

  .handle {
    font-size: 13px;
    color: var(--text-muted);
    margin: 2px 0 12px;
  }

  .bio {
    font-size: 13.5px;
    color: #c9c9c9;
    line-height: 1.55;
    margin-bottom: 16px;

  .stats {

    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;

  .stat {

    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
  }

  .stat-label {
    font-size: 10.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;

  /* ---- menu section ---- */
  .section-label {
    padding: 0 20px;
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* título de seção inserido no meio da lista de teclas */
  .menu-header {
    padding: 0;
    margin: 22px 0 2px;
  }

  /* o primeiro título de catálogo fica logo após as estatísticas,
     então usa uma margem menor pra não sobrar espaço vazio */
  .menu > .menu-header:first-child {
    margin-top: 4px;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .key {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 54px;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: var(--glass);
    border: 1px solid var(--accent-soft);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    color: var(--text);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14.5px;
    letter-spacing: -0.005em;
    transform: scale(1);
    box-shadow: 0 0 0 rgba(220,38,38,0);
    transition: transform 0.18s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  }

  .key:hover { background: var(--glass-hover); }

  .key.pressed {
    transform: scale(0.97);
    border-color: rgba(220, 38, 38, 0.7);
    box-shadow: 0 0 18px var(--accent-glow), 0 0 2px var(--accent-glow);
    background: rgba(38, 38, 0.06);
  }

  .key-label {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .key-price {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12px;
  }

  .key-arrow {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-2);
    opacity: 0.85;
    font-size: 14px;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ---- purchase notification toast ---- */
  .toast {
    position: fixed;
    right: 14px;
    top: 14px;
    width: min(220px, 60vw);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 11px;
    border-radius: 11px;
    background: rgba(16, 18, 16, 0.9);
    border: 1px solid var(--accent-soft);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02);
    transform: translateX(140%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1), opacity 0.4s ease;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(0);
    opacity: 1;
  }

  .toast-icon {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 1px;
  }

  .toast-text {
    flex: 1;
    min-width: 0;
  }

  .toast-title {
    font-size: 12.5px;
    font-weight: 600;
    color: #fff;
    line-height: 1.35;
    white-space: normal;
    word-break: break-word;
  }

  .toast-price {
    display: inline-block;
    margin-top: 3px;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .toast-sub {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .key, .subscribe-btn, .toast { transition: none; }
  }
</style>
</head>
<body>

<script>

  //      -> vira um link clicável logo abaixo do nome, que abre seu Telegram
  //    - COVER_IMAGE_URL: link direto de uma imagem para a capa (ex: link do imgur, ou de uma
  //      imagem hospedada em qualquer lugar). Deixe '' (vazio) para manter o gradiente atual.
  //    - AVATAR_IMAGE_URL: link direto da sua foto de perfil. Deixe '' (vazio) para manter as iniciais.

  const AVATAR_INITIALS   = 'TW';

  // 1) PRODUTOS DO MENU — os 40 produtos separados em 3 catálogos.

  //    OBS: o campo "href" de cada produto abaixo é ignorado — o clique
  //    sempre abre uma DM do Telegram com o nome do produto já preenchido
  //    (ver TELEGRAM_HANDLE e buildTelegramLink mais abaixo).
  const CATALOGS = [
    {
      title: '⬇️ALL MODELS LEAKD♨️',

    },
    {
      title: '⬇️ALL TEENS✨‼️',
      products: [
        { name: 'Amelia Blonde', price: 'To access' },
        { name: 'Baby Ashlee', price: 'To access' },
        { name: 'Darkzadie ', price: 'To access' },
        { name: 'Desiree Garcia', price: 'To access' },
        { name: 'Emmi Sellers', price: 'To access' },
        { name: 'Ivanka and Brother', price: 'To access' },
        { name: 'Izzy And Dog', price: 'To access' },
        { name: 'Izzy Green', price: 'To access' },
        { name: 'Izzy Arshua', price: 'To access' },
        { name: 'Lizzy and Brother', price: 'To access' },
        { name: 'Savannah', price: 'To access' },
        { name: 'Sophie Rain', price: 'To access' },
        { name: 'Ximena', price: 'To access' },
        { name: 'Rose', price: 'To access' },
        { name: 'Ava', price: 'To access' },
        { name: 'Anita', price: 'To access' },
        { name: 'Ash', price: 'To access' },
        { name: 'Mary H', price: 'To access' },
        { name: '⬆️ALL MODELS LEAKD🎭', price: 'To access' },
      ],
    },
    {
      title: '⬇️THEIR GAME❤️‍🔥',
      products: [
        { name: 'Anxious Panda', price: 'To access' },
        { name: 'Blackmail', price: 'To access' },
        { name: 'Snapgod full Edition', price: 'To access' },
        { name: 'Highschool', price: 'To access' },

        { name: 'New Stuff Pyt', price: 'To access' },
        { name: '⬆️ALL THEIR GAME❤️', price: 'To access' },
      ],
    },
  ];

  // achata os 3 catálogos numa lista única (usada nas estatísticas e nas
  // notificações de compra) e monta a lista de itens do menu já com os
  // títulos de cada catálogo intercalados.
  const PRODUCTS = [];
  const links = [];
  CATALOGS.forEach(cat => {
    links.push({ type: 'header', label: cat.title });
    cat.products.forEach(p => {
      PRODUCTS.push(p);
      links.push({ label: p.name, price: p.price, product: p });
    });
  });

  // 2) BUYER_NAMES — nomes usados nas notificações de compra (prova social).
  const BUYER_NAMES = [
    'James', 'Michael', 'William', 'Oliver', 'Jack', 'Liam', 'Ethan', 'Noah',
    'Henry', 'Daniel', 'Charlie', 'George', 'Thomas', 'Ryan', 'Lucas',
    'Benjamin', 'Samuel', 'Joshua', 'Alexander', 'Cooper',

  // 3) Telegram — sem bot. Cada clique num produto abre uma conversa (DM)

  //    cima), já com uma mensagem pronta perguntando sobre aquele produto.
  //    Edite o texto abaixo se quiser mudar a mensagem que é pré-preenchida.
  function buildTelegramLink(handle, product) {
    const msg = `Hi, I want the Folder: ${product.name}`;
    return `https://t.me/${handle}?text=${encodeURIComponent(msg)}`;
  }

  // =========================================================

  // ---- aplica a CONFIGURAÇÃO acima na página ----
  document.getElementById('profile-name').textContent = PROFILE_NAME;

  const handleClean = TELEGRAM_HANDLE.replace('@', '').trim();
  const handleEl = document.getElementById('telegram-handle');

  if (COVER_IMAGE_URL) {

    cover.style.backgroundImage = `url('${COVER_IMAGE_URL}')`;
  }

  const avatarEl = document.getElementById('avatar');
  if (AVATAR_IMAGE_URL) {
    avatarEl.style.backgroundImage = `url('${AVATAR_IMAGE_URL}')`;
    avatarEl.textContent = '';
  } else {
    avatarEl.textContent = AVATAR_INITIALS;
  }

  const menu = document.getElementById('menu');

  links.forEach(item => {
    if (item.type === 'header') {
      const h = document.createElement('p');
      h.className = 'section-label menu-header';
      h.textContent = item.label;
      menu.appendChild(h);
      return;
    }

    const a = document.createElement('a');
    a.href = buildTelegramLink(handleClean, item.product);
    a.className = 'key';
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <span class="key-label">${item.label}</span>
      ${item.price ? `<span class="key-price">${item.price}</span>` : ''}
      <span class="key-arrow">→ </span>
    `;

    const press = () => a.classList.add('pressed');
    const release = () => setTimeout(() => a.classList.remove('pressed'), 120);

    a.addEventListener('touchstart', press, { passive: true });
    a.addEventListener('touchend', release);
    a.addEventListener('touchcancel', release);
    a.addEventListener('mousedown', press);
    a.addEventListener('mouseup', release);
    a.addEventListener('mouseleave', release);

    menu.appendChild(a);
  });

  document.querySelector('.subscribe-btn').addEventListener('click', () => {
    const btn = document.querySelector('.subscribe-btn');
    btn.textContent = btn.textContent === 'Follow' ? 'Following ✓' : 'Follow';
  });

  // ---- purchase notification cycle ----
  const toast = document.getElementById('toast');
  const toastTitle = document.getElementById('toast-title');
  const toastPrice = document.getElementById('toast-price');
  const toastSub = document.getElementById('toast-sub');
  let idx = 0;

  function showNextToast() {
    if (!purchaseNotifications.length) return;
    const n = purchaseNotifications[idx % purchaseNotifications.length];
    toastTitle.textContent = `${n.name} bought ${n.product}`;
    toastPrice.textContent = n.price;
    toastSub.textContent = 'Purchase made just now';
    toast.classList.add('show');

    setTimeout(() => toast.classList.remove('show'), 4200);
    idx++;
  }

  setTimeout(showNextToast, 2500);
  setInterval(showNextToast, 9000);
</script>
