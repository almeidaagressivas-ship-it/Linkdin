<style>
  :root {
    --bg: #0B0B0B;
    --accent: #16A34A;
    --accent-2: #22C55E;
    --accent-soft: rgba(22, 163, 74, 0.18);
    --accent-glow: rgba(22, 163, 74, 0.55);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-hover: rgba(255, 255, 255, 0.055);
    --text: #E5E5E5;
    --text-muted: #7d7d7d;
    --radius: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding-bottom: 56px;
  }

  /* ---- cover + profile header ---- */
  .cover {
    position: relative;
    height: 150px;
    width: 100%;
    background-size: cover;
    background-position: center;
    background-color: #0B0B0B;
    overflow: hidden;
  }
  /* gradiente + grade aparecem só quando não há foto de capa definida (ver CONFIG no final do arquivo) */
  .cover.no-image {
    background-image:
      radial-gradient(ellipse 420px 260px at 30% 0%, rgba(34,197,94,0.35), transparent 65%),
      radial-gradient(ellipse 380px 240px at 85% 30%, rgba(22,163,74,0.25), transparent 60%),
      linear-gradient(160deg, #101210 0%, #0B0B0B 70%);
  }
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(11,11,11,0.05) 0%, rgba(11,11,11,0.85) 100%);
  }
  .cover.no-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                       linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 26px 26px;
    mask-image: linear-gradient(180deg, black, transparent 90%);
  }

  .profile-block {
    padding: 0 20px;
    margin-top: -38px;
    position: relative;
  }

  .avatar-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 20px;
    background: linear-gradient(150deg, #1a1c1a, #0d0f0d);
    background-size: cover;
    background-position: center;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent-soft), 0 8px 20px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--accent-2);
  }

  .online-dot {
    position: absolute;
    bottom: 3px;
    right: -2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-2);
    border: 3px solid var(--bg);
  }
  .avatar-wrap { position: relative; }

  .subscribe-btn {
    margin-bottom: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #0e7a37);
    color: #05140a;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 0.02em;
    border: none;
    box-shadow: 0 4px 16px rgba(22,163,74,0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .subscribe-btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
  }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 19px;
    margin: 0;
    color: #ffffff;
    letter-spacing: -0.01em;
  }

  .verified {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--accent-2);
  }

  .handle {
    font-size: 13px;
    color: var(--text-muted);
    margin: 2px 0 12px;
  }

  .bio {
    font-size: 13.5px;
    color: #c9c9c9;
    line-height: 1.55;
    margin-bottom: 16px;
  }

  .stats {
    display: flex;
    gap: 22px;
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
  }

  .stat-label {
    font-size: 10.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ---- menu section ---- */
  .section-label {
    padding: 0 20px;
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* título de seção inserido no meio da lista de teclas */
  .menu-header {
    padding: 0;
    margin: 22px 0 2px;
  }

  /* o primeiro título de catálogo fica logo após as estatísticas,
     então usa uma margem menor pra não sobrar espaço vazio */
  .menu > .menu-header:first-child {
    margin-top: 4px;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .key {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 54px;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: var(--glass);
    border: 1px solid var(--accent-soft);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    color: var(--text);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14.5px;
    letter-spacing: -0.005em;
    transform: scale(1);
    box-shadow: 0 0 0 rgba(22,163,74,0);
    transition: transform 0.18s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  }

  .key:hover { background: var(--glass-hover); }

  .key.pressed {
    transform: scale(0.97);
    border-color: rgba(22, 163, 74, 0.7);
    box-shadow: 0 0 18px var(--accent-glow), 0 0 2px var(--accent-glow);
    background: rgba(22, 163, 74, 0.06);
  }

  .key-label {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .key-price {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12px;
  }

  .key-arrow {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-2);
    opacity: 0.85;
    font-size: 14px;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ---- purchase notification toast ---- */
  .toast {
    position: fixed;
    right: 14px;
    top: 14px;
    width: min(220px, 60vw);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 11px;
    border-radius: 11px;
    background: rgba(16, 18, 16, 0.9);
    border: 1px solid var(--accent-soft);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02);
    transform: translateX(140%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1), opacity 0.4s ease;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(0);
    opacity: 1;
  }

  .toast-icon {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 1px;
  }

  .toast-text {
    flex: 1;
    min-width: 0;
  }

  .toast-title {
    font-size: 12.5px;
    font-weight: 600;
    color: #fff;
    line-height: 1.35;
    white-space: normal;
    word-break: break-word;
  }

  .toast-price {
    display: inline-block;
    margin-top: 3px;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .toast-sub {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .key, .subscribe-btn, .toast { transition: none; }
  }
</style>
</head>

  //    lista "products" com nome e preço.

    cat.products.forEach(p => {

  const BUYER_NAMES = [
    'James', 'Michael', 'William', 'Oliver', 'Jack', 'Liam', 'Ethan', 'Noah',
    'Henry', 'Daniel', 'Charlie', 'George', 'Thomas', 'Ryan', 'Lucas',
    'Benjamin', 'Samuel', 'Joshua', 'Alexander', 'Cooper',

  //    cima), já com uma mensagem pronta perguntando sobre aquele produto.
  //    Edite o texto abaixo se quiser mudar a mensagem que é pré-preenchida.
  function buildTelegramLink(handle, product) {
    const msg = `Hi, I want the Folder: ${product.name}`;
    return `https://t.me/${handle}?text=${encodeURIComponent(msg)}`;
  }

  // =========================================================

  // ---- aplica a CONFIGURAÇÃO acima na página ----

      h.className = 'section-label menu-header';
      h.textContent = item.label;
      menu.appendChild(h);
      return;

    a.className = 'key';
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `

      ${item.price ? `<span class="key-price">${item.price}</span>` : ''}
      <span class="key-arrow">→ </span>
